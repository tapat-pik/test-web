<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px;
    }
    h1 {
      margin-bottom: 16px;
      font-size: 28px;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 2fr 1fr;
      }
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      padding: 18px;
    }
    .card h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #e6e9f0;
      text-align: left;
    }
    thead th {
      background: #f2f6ff;
      font-weight: 600;
    }
    .status {
      padding: 3px 8px;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }
    .status-success { background: #28a745; }
    .status-warning { background: #ffc107; color: #212529; }
    .status-danger  { background: #dc3545; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Dashboard</h1>

    <div class="grid">
      <div class="card">
        <h2>ตารางสรุปข้อมูล</h2>
        <table>
          <thead>
            <tr>
              <th>ไอดี</th>
              <th>ชื่อสินค้า</th>
              <th>จำนวนขาย</th>
              <th>รายได้ (฿)</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>001</td><td>ผลิตภัณฑ์ A</td><td>720</td><td>144,000</td><td><span class="status status-success">ดี</span></td>
            </tr>
            <tr>
              <td>002</td><td>ผลิตภัณฑ์ B</td><td>530</td><td>79,500</td><td><span class="status status-warning">ปานกลาง</span></td>
            </tr>
            <tr>
              <td>003</td><td>ผลิตภัณฑ์ C</td><td>190</td><td>28,500</td><td><span class="status status-danger">ต่ำ</span></td>
            </tr>
            <tr>
              <td>004</td><td>ผลิตภัณฑ์ D</td><td>430</td><td>64,500</td><td><span class="status status-success">ดี</span></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>กราฟยอดขายรายเดือน</h2>
        <canvas id="revenueChart" width="400" height="300"></canvas>
      </div>

      <div class="card">
        <h2>กราฟเปรียบเทียบสินค้า</h2>
        <canvas id="productChart" width="400" height="300"></canvas>
      </div>
    </div>
  </div>

  <script>
    const ctx1 = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.'],
        datasets: [{
          label: 'รายได้ (พันบาท)',
          data: [120, 150, 170, 190, 220, 240],
          borderColor: '#377dff',
          backgroundColor: 'rgba(55,125,255,0.2)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    const ctx2 = document.getElementById('productChart').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['A', 'B', 'C', 'D'],
        datasets: [{
          label: 'ยอดขาย',
          data: [720, 530, 190, 430],
          backgroundColor: ['#4b96ff', '#f6b93b', '#e03e2f', '#28a745']
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>
</body>
</html>
